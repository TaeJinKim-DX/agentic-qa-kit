# =============================================================================
# qa-config.yaml — 라이브 QA 계약 (P1 인터뷰 산출물, [게이트1] 승인으로 확정)
# -----------------------------------------------------------------------------
# 사용법: P1 인터뷰(phases/P1-interview.md) 답을 채워 <프로젝트 루트>/qa/qa-config.yaml 로 생성한다.
#   - [필수입력] = 사실 질문. 사용자가 직접 답한다(P0 발견으로 후보 답 제시 가능).
#     태그 없는 필드 = 판단 질문. 전부 추천 기본값이 있고 "다 추천대로"가 가능하다.
#   - 시크릿 실값 기재 금지(원칙 6) — *_secret_ref 필드에는 .env.qa 의 키 이름만 적는다.
#     실값은 gitignored qa/.env.qa 에 사용자가 직접 기입, 에이전트는 존재만 확인한다.
#   - 확정 후 변경도 게이트를 거친다(원칙 10). 에이전트가 임의 수정 금지.
# =============================================================================

meta:
  kit_version: "<킷 CHANGELOG.md 최신 버전>"   # 킷 버전 스탬프 — 드리프트 감지용(정본은 킷 CHANGELOG.md)
  config_schema_version: "1"                    # 이 파일의 스키마 버전 — 킷 갱신 시 diff 인터뷰 기준
  project_name: "<프로젝트명>"                  # 기본값: P0에서 발견한 저장소/패키지 이름
  created: "<YYYY-MM-DD>"                       # 이 config 최초 확정일

# --- 환경: 이름 → 정의 맵. QA 대상 환경을 전부 등록한다 ------------------------
environments:
  stage:                                        # 환경 이름(예시 키 — 실제 환경 이름으로 교체)
    base_url: "<https://...>"                   # [필수입력] 대상 환경 URL
    grade: stage                                # prod|stage|dev — prod는 유인+읽기전용만
    account_secret_ref: QA_STAGE_ACCOUNT        # [필수입력] 이 환경 계정의 .env.qa 키 이름(실값 금지)
    unattended_allowed: true                    # 무인 실행 허용. 기본값: 비-prod true / prod 강제 false
    data_boundary: "<테스트 데이터 생성 허용 경계>"  # 네임스페이스·전용 계정·스키마 등. 기본값: test_prefix 접두 리소스만
    fingerprint:                                # 런타임 환경 신원 검증 — prod 오인 차단. P0에서 후보 자동 채움, P1에서 확정
      health_path: "<경로 — 예: /api/health>"
      expect:
        <키>: "<값 — 예: env: stage>"
  # prod:                                       # prod를 등록하는 경우의 강제값 예시
  #   base_url: "<https://...>"                 # [필수입력]
  #   grade: prod
  #   account_secret_ref: QA_PROD_ACCOUNT       # [필수입력]
  #   unattended_allowed: false                 # prod는 false 고정 — 변경 금지
  #   data_boundary: "생성 금지(읽기전용)"       # prod 기본값: 읽기전용

# --- 타임존: 시간 경계 케이스(E)의 판정 기준 -----------------------------------
timezone:
  storage: "UTC"                                # 저장 타임존. 기본값: P0 발견값(모르면 UTC)
  display: "<Asia/Seoul 등>"                    # 표시 타임존. storage와 다르면 시간 경계 케이스 의무

# --- 데이터: 격리·불가침·보존 ---------------------------------------------------
data:
  test_prefix: "qa-"                            # 생성 리소스 식별 접두(원칙 4). 기본값 qa- (run-id 병기)
  deny_list: []                                 # 불가침 실데이터 식별자·패턴(기계 차단 대상). P0 초안 → P1 확정
    # - "user:admin@*"                          # 예: 실계정 패턴
  cleanup_method: soft                          # soft | hard — 테스트 데이터 정리 방식. 프로젝트 삭제 정책을 따름, P0 발견 정책이 기본값
  retention:
    softdelete_purge: "30d"                     # soft-delete 잔재 purge 주기. cleanup_method: soft 일 때만 의미 있음(hard면 무시 — null 로 둬도 됨)
    runs_keep: 20                               # runs/<env>-<run-id>/ 보존 개수. 기본값 20(초과분 오래된 것부터 삭제)

# --- 인증: 역할·세션 정책(상세 규약은 patterns/auth-roles.md) --------------------
auth:
  roles:                                        # 테스트할 역할 전부 — 권한 케이스(D)의 축
    - name: admin                               # 역할 이름(qa/.auth/<role>.state.json 의 <role>)
      login_method: form                        # form|sso|token|manual — manual=유인 로그인 후 세션 저장
      secret_ref: QA_ADMIN_CRED                 # [필수입력] .env.qa 키 이름(실값 금지)
      session_lifetime: "8h"                    # 세션 수명. 만료시각은 .auth/<role>.state.json 에 기록
    # - name: member
    #   login_method: form
    #   secret_ref: QA_MEMBER_CRED              # [필수입력]
    #   session_lifetime: "8h"
  concurrent_session_policy: single             # single|parallel — 공유 계정이면 single(동시 세션 충돌 방지). 기본값 single

# --- 위험: 불가역 액션·예산 -----------------------------------------------------
risk:
  irreversible_actions: []                      # 불가역 액션 deny-list 확정본(P0 자동 초안 → P1 사용자 확정)
    # - "DELETE /api/<resource>/*"              # 라우트 패턴 — 무인 시 네트워크 레벨 차단
    # - "메일 발송 버튼"                         # UI 휴리스틱 차단 대상(대화형 경로)
  budget_per_run:
    external_calls: 100                         # run당 외부 API 호출 상한. 초과 시 중단+에스컬레이션. 기본값 100
    resource_creations: 20                      # run당 리소스 생성 상한. 초과 시 중단+에스컬레이션. 기본값 20

# --- 범위: 무엇을 얼마나 --------------------------------------------------------
scope:
  priority_features: []                         # 우선 검증 기능 목록 — 기능마다 A·B·D 최소 1케이스(phases/P2-artifacts.md)
    # - "<기능명>"
  excluded: []                                  # 이번 범위 제외(기능·라우트) — 제외 사유를 주석으로
  case_cap: 40                                  # 1차 케이스 총량 상한. 기본값 40

# --- 운영: 스케줄·실패·통보 ------------------------------------------------------
ops:
  schedule:
    approved: false                             # [게이트4] 명시 허가 전 false 고정 — 에이전트가 임의로 true 금지
    cadence: ""                                 # 주기(예: "매일 1회"). 게이트4에서 확정 — run 최대 소요시간보다 길어야 함
    window: ""                                  # 실행 시간창(예: "02:00-04:00")
    env: ""                                     # 무인 대상 환경 이름 — environments 중 unattended_allowed: true 만 가능
    trigger_method: ""                          # cron | OS 작업 스케줄러 | 에이전트 스케줄 기능 — P0 능력 프로파일 기준
  failure_policy: "연속 2회 실패 시 중단+통보"    # 연속 실패 에스컬레이션 기준. 기본값: 연속 2회
  notify:
    channel: file                               # 통보 채널. 기본값 file(리포트 파일만) — 푸시 채널은 프로젝트 선택
    ack_hours: 24                               # 사용자 확인 책임 시한(시간). 기본값 24
  # 런타임 안전장치(값이 아니라 러너가 강제하는 계약 — 참조용):
  #   킬스위치 = qa/.stop 플래그 파일(케이스 경계마다 + 스크립트 내부 루프 폴링 체크)
  #   실행 락  = qa/.lock (존재+신선 시 시작 거부, stale 판정 30분 — 이후 잔여물 정리 후 인수)

# --- redaction: 증거 저장 전 마스킹 정규식(원칙 6, patterns/evidence.md) ---------
secret_patterns:                                # Authorization/Cookie 헤더 제거는 기본 내장 — body 마스킹용 추가 패턴
  - "(?i)(token|secret|password|api[_-]?key)"   # 기본값. 프로젝트 고유 토큰 패턴을 P0/P1에서 추가 등록
  # - "<프로젝트 고유 시크릿 패턴>"
